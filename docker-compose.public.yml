services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: fightclawb-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fightclawb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fightclawb-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Application services ─────────────────────────────────────────────────────

  arena-identity:
    build:
      context: .
      dockerfile: services/arena-identity/Dockerfile
    container_name: fightclawb-identity
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fightclawb}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
    ports:
      - "3002:3001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  arena-gateway:
    build:
      context: .
      dockerfile: services/arena-gateway/Dockerfile
    container_name: fightclawb-gateway
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fightclawb}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - IDENTITY_SERVICE_URL=http://arena-identity:3001
    ports:
      - "3001:3002"
    restart: unless-stopped
    depends_on:
      arena-identity:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fightclawb-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - arena-gateway
      - arena-identity

  # ── Reverse proxy (optional — remove if using external Nginx/Caddy) ────────

  caddy:
    image: caddy:2-alpine
    container_name: fightclawb-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}
    volumes:
      - ./Caddyfile.public:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - frontend
      - arena-gateway
      - arena-identity
    profiles:
      - caddy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
