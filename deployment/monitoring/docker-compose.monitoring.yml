version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Agent Arena — Monitoring Stack
# Prometheus + Grafana + Loki + Promtail + Node Exporter + Alertmanager
#
# Start:   docker compose -f docker-compose.monitoring.yml up -d
# Grafana: http://localhost:3100  (admin / change_me_in_prod)
# Prom:    http://localhost:9090
# Loki:    http://localhost:3200  (internal only)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  monitoring:
    driver: bridge
  arena:
    external: true   # shared with arena-identity and arena-gateway containers
    name: arena_default

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

services:

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: arena-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'          # hot-reload via POST /-/reload
      - '--web.enable-admin-api'
      - '--query.max-samples=50000000'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - monitoring
      - arena
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=false'

  # ── Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: arena-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - '9093:9093'
    networks:
      - monitoring
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9093/-/healthy']
      interval: 15s
      timeout: 10s
      retries: 3

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: arena-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:       admin
      GF_SECURITY_ADMIN_PASSWORD:   change_me_in_prod
      GF_SERVER_HTTP_PORT:          3100
      GF_SERVER_ROOT_URL:           http://localhost:3100
      GF_FEATURE_TOGGLES_ENABLE:    publicDashboards
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_USERS_ALLOW_SIGN_UP:       false
      # Pre-provision datasources and dashboards
      GF_PATHS_PROVISIONING:        /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3100:3100'
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3100/api/health']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Loki ───────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: arena-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - '3200:3200'
    networks:
      - monitoring
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3200/ready']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Promtail — ships container logs → Loki ─────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.7
    container_name: arena-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/docker.sock:/run/docker.sock:ro
    networks:
      - monitoring
      - arena
    depends_on:
      - loki
    user: root   # needed to read /var/lib/docker/containers

  # ── Node Exporter — host system metrics ───────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: arena-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - '9100:9100'
    networks:
      - monitoring
    pid: host

  # ── Postgres Exporter ──────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: arena-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: 'postgresql://arena:${PGPASSWORD:-arena_dev_password_change_in_prod}@arena-postgres:5432/arena?sslmode=disable'
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: 'true'
    ports:
      - '9187:9187'
    networks:
      - monitoring
      - arena
    depends_on:
      - prometheus

  # ── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: arena-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR:     'redis://arena-redis:6379'
      REDIS_PASSWORD: '${REDIS_PASSWORD:-arena_dev_password_change_in_prod}'
    ports:
      - '9121:9121'
    networks:
      - monitoring
      - arena
    depends_on:
      - prometheus
