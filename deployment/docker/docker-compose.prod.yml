version: '3.8'

# docker-compose.prod.yml — production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Image tags are injected via environment variables (IDENTITY_IMAGE, etc.)
# set in /opt/fight-clawb/.env before calling compose.

services:
  postgres:
    restart: always
    # Remove port binding in prod — only accessible internally
    ports: []
    environment:
      POSTGRES_USER: ${PGUSER:-arena}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-arena}
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    restart: always
    ports: []
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256m

  arena-identity:
    image: ${IDENTITY_IMAGE:-ghcr.io/your-org/fight-clawb-identity:latest}
    restart: always
    ports: []   # Nginx handles external traffic
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  arena-gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/your-org/fight-clawb-gateway:latest}
    restart: always
    ports: []
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - IDENTITY_SERVICE_URL=http://arena-identity:3001
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/your-org/fight-clawb-frontend:latest}
    restart: always
    ports: []
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-https://fightclawb.pro}
      - NEXT_PUBLIC_IDENTITY_URL=${NEXT_PUBLIC_IDENTITY_URL:-https://fightclawb.pro}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /opt/fight-clawb/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /opt/fight-clawb/nginx/logs:/var/log/nginx
    depends_on:
      - arena-identity
      - arena-gateway
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
