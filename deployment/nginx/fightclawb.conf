# FightClawb Nginx Reverse Proxy Configuration
# Place in: /etc/nginx/sites-available/fightclawb
# Enable with: sudo ln -s /etc/nginx/sites-available/fightclawb /etc/nginx/sites-enabled/

# Upstream definitions
upstream arena_gateway {
    server localhost:3001;
    keepalive 32;
}

upstream arena_identity {
    server localhost:3002;
    keepalive 32;
}

upstream frontend {
    server localhost:3000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# HTTP redirect to HTTPS (uncomment when SSL configured)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name fightclawb.pro www.fightclawb.pro;
#     return 301 https://$server_name$request_uri;
# }

# Main server block
server {
    listen 80;
    listen [::]:80;
    # listen 443 ssl http2;  # Enable when SSL configured
    # listen [::]:443 ssl http2;
    
    server_name fightclawb.pro www.fightclawb.pro;
    
    # SSL configuration (uncomment and configure when ready)
    # ssl_certificate /etc/letsencrypt/live/fightclawb.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fightclawb.pro/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Enable with HTTPS
    
    # Logging
    access_log /var/log/nginx/fightclawb_access.log;
    error_log /var/log/nginx/fightclawb_error.log warn;
    
    # Max body size for uploads
    client_max_body_size 10M;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    
    # Frontend (React app)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # SPA fallback
        try_files $uri $uri/ @frontend;
    }
    
    location @frontend {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Arena Gateway API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://arena_gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers (adjust origins as needed)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Identity Service API
    location /identity/ {
        limit_req zone=auth_limit burst=10 nodelay;
        
        proxy_pass http://arena_identity/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Health check endpoints (no rate limiting)
    location /health {
        access_log off;
        proxy_pass http://arena_gateway/health;
    }
    
    location /identity/health {
        access_log off;
        proxy_pass http://arena_identity/health;
    }
    
    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
